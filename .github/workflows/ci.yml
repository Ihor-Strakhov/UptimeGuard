name: CI/CD for project

on:
  push:
    branches: [main]

env:
  PROJECT_ID: uptimeguard-495411
  REGION: europe-central2
  REPOSITORY: uptime-guard-repo
  IMAGE: uptimeimg

jobs:
  Ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check . --output-format=github

      - name : Run Ruff Formatter
        run: ruff format --check .

  Docker:
    runs-on: ubuntu-latest
    needs: Ruff
    env:
      IMAGE: europe-central2-docker.pkg.dev/$PROJECT_ID/uptime-guard-repo/uptimeimg
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA .
      
      - name: Push Docker image
        run: docker push $IMAGE:$GITHUB_SHA

  Deploy:
    runs-on: ubuntu-latest
    needs: Docker
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVAT_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'

          set -e

          IMAGE="europe-central2-docker.pkg.dev/$PROJECT_ID/uptime-guard-repo/uptimeimg:${{ github.sha }}"

          echo "Pulling image: $IMAGE"
          docker pull $IMAGE

          echo "Stopping old container"
          docker stop uptimeguard || true
          docker rm uptimeguard || true

          echo "Starting new container"
          docker run -d \
            --name uptimeguard \
            -p 80:8000 \
            $IMAGE

          echo "Deployment successful"
          EOF