name: CI/CD for project

on:
  push:
    branches: [main]

env:
  PROJECT_ID: uptimeguard-495411
  REGION: europe-central2
  REPOSITORY: uptime-guard-repo
  IMAGE: uptimeimg

jobs:
  Ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check . --output-format=github

      - name : Run Ruff Formatter
        run: ruff format --check .

  Docker:
    runs-on: ubuntu-latest
    needs: Ruff
    env:
      IMAGE: europe-central2-docker.pkg.dev/uptimeguard-495411/uptime-guard-repo/uptimeimg
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA .
      
      - name: Push Docker image
        run: docker push $IMAGE:$GITHUB_SHA