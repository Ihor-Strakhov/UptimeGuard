<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit URL</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
        }

        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="urlInput" placeholder="Enter website URL">
        <input type="number" id="intervalInput" placeholder="Interval (minutes)" min="1">
        <button id="submitBtn">Submit</button>
    </div>
    

<script>
document.getElementById("submitBtn").addEventListener("click", submitSite);

async function submitSite() {
    const url = document.getElementById("urlInput").value;
    const interval = document.getElementById("intervalInput").value;

    console.log("CLICKED", url, interval);

    const response = await fetch("/site", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            url: url,
            interval_minutes: Number(interval)
        })
    });

    const data = await response.json();
    console.log(data);
}
</script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input {
    padding: 10px;
    width: 300px;
}

button {
    padding: 10px;
    cursor: pointer;
}
</style>

</body>
</html>
