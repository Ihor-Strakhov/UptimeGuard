services:
  db:
    image: postgres:16
    container_name: uptimeguard-db

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - pgdata:/var/lib/postgresql/data

  init:
    build: .

    command: python -m app.init_db

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

  app:
    build: .

    container_name: uptimeguard-app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      init:
        condition: service_completed_successfully

  worker:
    build: .

    container_name: uptimeguard-worker

    command: python -m app.checker

    env_file:
      - .env

    depends_on:
      init:
        condition: service_completed_successfully

volumes:
  pgdata: